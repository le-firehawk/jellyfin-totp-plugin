name: Build Jellyfin TOTP Plugin

on:
  push:
    branches: [ '**' ]
    tags: [ 'v*' ]
  pull_request:
  workflow_dispatch:

concurrency:
  group: jellyfin-totp-plugin-manifest
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      CONFIGURATION: Release
      ARTIFACT_NAME: Jellyfin.Plugin.Totp
      TARGET_ABI: 10.10.0.0
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Resolve build metadata
        id: build_metadata
        shell: bash
        env:
          EVENT_NAME: ${{ github.event_name }}
          REF_NAME: ${{ github.ref_name }}
          REF_TYPE: ${{ github.ref_type }}
          SHA: ${{ github.sha }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          set -euo pipefail

          short_sha="${SHA::7}"
          source_sha="$SHA"
          base_version="$(python3 -c 'import json, re; from pathlib import Path; versions = json.loads(Path("manifest.json").read_text(encoding="utf-8"))[0].get("versions", []); print(next((m.group(1) for item in versions if (m := re.match(r"^(\\d+\\.\\d+\\.\\d+)(?:[.-].*)?$", item.get("version", "")))), "0.1.0"))')"

          if [[ "$REF_TYPE" == "tag" && "$REF_NAME" == v* ]]; then
            release_tag="$REF_NAME"
            version="${REF_NAME#v}"
            changelog="Release ${REF_NAME}."
            prerelease="false"
          elif [[ "$EVENT_NAME" == "pull_request" ]]; then
            source_sha="$PR_SHA"
            short_sha="${PR_SHA::7}"
            release_tag="pr-${PR_NUMBER}-${short_sha}"
            version="${base_version}-pr.${PR_NUMBER}.${short_sha}"
            changelog="Pull request #${PR_NUMBER} build ${short_sha}."
            prerelease="true"
          else
            release_tag="dev-${short_sha}"
            version="${base_version}-dev.${short_sha}"
            changelog="Development build ${short_sha}."
            prerelease="true"
          fi

          if [[ ! "$version" =~ ^[0-9]+\.[0-9]+\.[0-9]+([.-].*)?$ ]]; then
            echo "Resolved plugin version '${version}' is not a SemVer value." >&2
            exit 1
          fi

          assembly_version="${version%%[-+]*}.0"
          asset_name="${release_tag}-${ARTIFACT_NAME}.zip"

          {
            echo "version=$version"
            echo "assembly_version=$assembly_version"
            echo "release_tag=$release_tag"
            echo "asset_name=$asset_name"
            echo "changelog=$changelog"
            echo "prerelease=$prerelease"
            echo "source_sha=$source_sha"
          } >> "$GITHUB_OUTPUT"

          echo "Building ${ARTIFACT_NAME} ${version} (${assembly_version}) for ${release_tag}."

      - name: Restore
        run: dotnet restore Jellyfin.Plugin.Totp.csproj

      - name: Build
        run: >-
          dotnet build Jellyfin.Plugin.Totp.csproj
          --configuration "$CONFIGURATION"
          --no-restore
          -p:Version=${{ steps.build_metadata.outputs.version }}
          -p:AssemblyVersion=${{ steps.build_metadata.outputs.assembly_version }}
          -p:FileVersion=${{ steps.build_metadata.outputs.assembly_version }}
          -p:InformationalVersion=${{ steps.build_metadata.outputs.version }}

      - name: Publish
        run: >-
          dotnet publish Jellyfin.Plugin.Totp.csproj
          --configuration "$CONFIGURATION"
          --no-build
          --output dist/plugin
          -p:Version=${{ steps.build_metadata.outputs.version }}
          -p:AssemblyVersion=${{ steps.build_metadata.outputs.assembly_version }}
          -p:FileVersion=${{ steps.build_metadata.outputs.assembly_version }}
          -p:InformationalVersion=${{ steps.build_metadata.outputs.version }}

      - name: Package plugin
        shell: bash
        run: |
          set -euo pipefail
          cd dist/plugin
          zip -r "../${{ steps.build_metadata.outputs.asset_name }}" .
          cd ../..
          echo "Plugin ZIP: dist/${{ steps.build_metadata.outputs.asset_name }}" >> "$GITHUB_STEP_SUMMARY"
          echo "Repository manifest: https://github.com/${GITHUB_REPOSITORY}/raw/${{ github.event.repository.default_branch }}/manifest.json" >> "$GITHUB_STEP_SUMMARY"

      - name: Update manifest
        id: manifest
        shell: bash
        env:
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
        run: |
          set -euo pipefail

          version="${{ steps.build_metadata.outputs.version }}"
          release_tag="${{ steps.build_metadata.outputs.release_tag }}"
          asset_name="${{ steps.build_metadata.outputs.asset_name }}"
          checksum="$(md5sum "dist/${asset_name}" | awk '{print $1}')"
          source_url="https://github.com/${GITHUB_REPOSITORY}/releases/download/${release_tag}/${asset_name}"
          changelog="${{ steps.build_metadata.outputs.changelog }}"

          git fetch origin "${DEFAULT_BRANCH}"
          git checkout -B "${DEFAULT_BRANCH}" "origin/${DEFAULT_BRANCH}"

          python3 scripts/append_manifest_version.py \
            --version "$version" \
            --target-abi "$TARGET_ABI" \
            --source-url "$source_url" \
            --checksum "$checksum" \
            --changelog "$changelog"

          {
            echo "version=$version"
            echo "checksum=$checksum"
            echo "source_url=$source_url"
          } >> "$GITHUB_OUTPUT"

      - name: Validate static repository manifest
        run: python3 -m json.tool manifest.json > /dev/null

      - name: Upload plugin package
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.build_metadata.outputs.release_tag }}-package
          path: |
            dist/${{ steps.build_metadata.outputs.asset_name }}
            manifest.json

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.build_metadata.outputs.release_tag }}
          target_commitish: ${{ steps.build_metadata.outputs.source_sha }}
          prerelease: ${{ steps.build_metadata.outputs.prerelease }}
          make_latest: false
          fail_on_unmatched_files: true
          files: |
            dist/${{ steps.build_metadata.outputs.asset_name }}
            manifest.json

      - name: Commit manifest update
        shell: bash
        env:
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
        run: |
          set -euo pipefail

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add manifest.json
          if git diff --cached --quiet; then
            echo "Manifest already contains ${{ steps.build_metadata.outputs.release_tag }}; no commit needed."
            exit 0
          fi

          git commit -m "Update manifest for ${{ steps.build_metadata.outputs.release_tag }} [skip ci]"
          git push origin "HEAD:${DEFAULT_BRANCH}"

      - name: Move latest tag
        if: startsWith(github.ref, 'refs/tags/v')
        shell: bash
        run: |
          set -euo pipefail
          git tag --force latest "${GITHUB_SHA}"
          git push --force origin latest
