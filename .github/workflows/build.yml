name: Build Jellyfin TOTP Plugin

on:
  push:
    branches: [ '**' ]
    tags: [ 'v*' ]
  pull_request:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      CONFIGURATION: Release
      ARTIFACT_NAME: Jellyfin.Plugin.Totp
      TARGET_ABI: 10.10.0.0
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore
        run: dotnet restore Jellyfin.Plugin.Totp.csproj

      - name: Build
        run: dotnet build Jellyfin.Plugin.Totp.csproj --configuration "$CONFIGURATION" --no-restore

      - name: Publish
        run: dotnet publish Jellyfin.Plugin.Totp.csproj --configuration "$CONFIGURATION" --no-build --output dist/plugin

      - name: Package plugin
        shell: bash
        run: |
          set -euo pipefail
          cd dist/plugin
          zip -r ../${ARTIFACT_NAME}.zip .
          cd ../..
          CHECKSUM=$(sha256sum dist/${ARTIFACT_NAME}.zip | awk '{print $1}')
          SHORT_SHA="${GITHUB_SHA::7}"
          REPO_URL="https://github.com/${GITHUB_REPOSITORY}"

          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            RELEASE_TAG="${GITHUB_REF_NAME}"
            VERSION="${RELEASE_TAG#v}"
            SOURCE_URL="${REPO_URL}/releases/download/${RELEASE_TAG}/${ARTIFACT_NAME}.zip"
            CHANGELOG="Automated release ${RELEASE_TAG} from commit ${SHORT_SHA}."
          else
            REF_SLUG=$(echo "${GITHUB_REF_NAME}" | tr '/:' '--')
            VERSION="0.0.0-${REF_SLUG}.${SHORT_SHA}"
            SOURCE_URL="${REPO_URL}/actions/runs/${GITHUB_RUN_ID}"
            CHANGELOG="Automated build from ${GITHUB_REF_NAME} at commit ${SHORT_SHA}."
          fi

          python3 scripts/render_manifest.py \
            --version "$VERSION" \
            --target-abi "$TARGET_ABI" \
            --source-url "$SOURCE_URL" \
            --checksum "$CHECKSUM" \
            --changelog "$CHANGELOG" \
            --output "dist/manifest.json"

          echo "Manifest URL: ${REPO_URL}/releases/latest/download/manifest.json" >> "$GITHUB_STEP_SUMMARY"
          echo "Release ZIP URL: ${SOURCE_URL}" >> "$GITHUB_STEP_SUMMARY"

      - name: Upload plugin package
        uses: actions/upload-artifact@v4
        with:
          name: Jellyfin.Plugin.Totp-package
          path: |
            dist/Jellyfin.Plugin.Totp.zip
            dist/manifest.json

      - name: Publish GitHub release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/Jellyfin.Plugin.Totp.zip
            dist/manifest.json
