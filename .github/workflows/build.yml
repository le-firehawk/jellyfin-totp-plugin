name: Build Jellyfin TOTP Plugin

on:
  push:
    branches: [ '**' ]
    tags: [ 'v*' ]
  pull_request:
  workflow_dispatch:
  release:
    types: [ published ]

permissions:
  contents: write

jobs:
  build:
    if: github.event_name != 'release' || github.event.release.tag_name != 'latest'
    runs-on: ubuntu-latest
    env:
      CONFIGURATION: Release
      ARTIFACT_NAME: Jellyfin.Plugin.Totp
      TARGET_ABI: 10.10.0.0
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore
        run: dotnet restore Jellyfin.Plugin.Totp.csproj

      - name: Build
        run: dotnet build Jellyfin.Plugin.Totp.csproj --configuration "$CONFIGURATION" --no-restore

      - name: Publish
        run: dotnet publish Jellyfin.Plugin.Totp.csproj --configuration "$CONFIGURATION" --no-build --output dist/plugin

      - name: Package plugin and manifests
        shell: bash
        run: |
          set -euo pipefail
          cd dist/plugin
          zip -r ../${ARTIFACT_NAME}.zip .
          cd ../..
          CHECKSUM=$(sha256sum dist/${ARTIFACT_NAME}.zip | awk '{print $1}')
          SHORT_SHA="${GITHUB_SHA::7}"
          REPO_URL="https://github.com/${GITHUB_REPOSITORY}"

          if [[ "${GITHUB_EVENT_NAME}" == "release" ]]; then
            RELEASE_TAG="${{ github.event.release.tag_name }}"
          elif [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            RELEASE_TAG="${GITHUB_REF_NAME}"
          else
            RELEASE_TAG=""
          fi

          normalize_version() {
            local tag="$1"
            local candidate="${tag#v}"
            if [[ "$candidate" =~ ^[0-9]+(\.[0-9]+){1,3}$ ]]; then
              printf '%s\n' "$candidate"
            elif [[ "$tag" =~ ([0-9]{4})-([0-9]{1,2})-([0-9]{1,2})-([0-9]{1,2}) ]]; then
              printf '%s.%s.%s.%s\n' "${BASH_REMATCH[1]}" "${BASH_REMATCH[2]}" "${BASH_REMATCH[3]}" "${BASH_REMATCH[4]}"
            else
              printf '0.0.0.0\n'
            fi
          }

          if [[ -n "${RELEASE_TAG}" ]]; then
            VERSION="$(normalize_version "${RELEASE_TAG}")"
            SOURCE_URL="${REPO_URL}/releases/download/${RELEASE_TAG}/${ARTIFACT_NAME}.zip"
            LATEST_SOURCE_URL="${REPO_URL}/releases/download/latest/${ARTIFACT_NAME}.zip"
            CHANGELOG="Automated release ${RELEASE_TAG} from commit ${SHORT_SHA}."
          else
            VERSION="0.0.0.0"
            SOURCE_URL="${REPO_URL}/actions/runs/${GITHUB_RUN_ID}"
            LATEST_SOURCE_URL="${SOURCE_URL}"
            CHANGELOG="Automated build from ${GITHUB_REF_NAME} at commit ${SHORT_SHA}. This workflow artifact is not intended to be imported as a Jellyfin plugin repository."
          fi

          python3 scripts/render_manifest.py \
            --version "$VERSION" \
            --target-abi "$TARGET_ABI" \
            --source-url "$SOURCE_URL" \
            --checksum "$CHECKSUM" \
            --changelog "$CHANGELOG" \
            --output "dist/manifest.json"

          python3 scripts/render_manifest.py \
            --version "$VERSION" \
            --target-abi "$TARGET_ABI" \
            --source-url "$LATEST_SOURCE_URL" \
            --checksum "$CHECKSUM" \
            --changelog "$CHANGELOG" \
            --output "dist/latest/manifest.json"

          if [[ -n "${RELEASE_TAG}" ]]; then
            echo "Manifest URL: ${REPO_URL}/releases/download/${RELEASE_TAG}/manifest.json" >> "$GITHUB_STEP_SUMMARY"
            echo "Latest manifest URL: ${REPO_URL}/releases/download/latest/manifest.json" >> "$GITHUB_STEP_SUMMARY"
            echo "Release ZIP URL: ${SOURCE_URL}" >> "$GITHUB_STEP_SUMMARY"
            echo "Latest ZIP URL: ${LATEST_SOURCE_URL}" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "Workflow artifact manifest version: ${VERSION}" >> "$GITHUB_STEP_SUMMARY"
            echo "Workflow artifact ZIP URL: ${SOURCE_URL}" >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Upload plugin package
        uses: actions/upload-artifact@v4
        with:
          name: Jellyfin.Plugin.Totp-package
          path: |
            dist/Jellyfin.Plugin.Totp.zip
            dist/manifest.json
            dist/latest/manifest.json

      - name: Publish GitHub release
        if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.release.tag_name || github.ref_name }}
          fail_on_unmatched_files: true
          files: |
            dist/Jellyfin.Plugin.Totp.zip
            dist/manifest.json

      - name: Move latest tag
        if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'release'
        shell: bash
        run: |
          set -euo pipefail
          git tag --force latest "${GITHUB_SHA}"
          git push --force origin latest

      - name: Prepare latest manifest asset
        if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'release'
        shell: bash
        run: cp dist/latest/manifest.json dist/manifest.json

      - name: Publish latest GitHub release
        if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: Latest Jellyfin TOTP Plugin Build
          body: |
            Rolling release updated from ${{ github.event.release.tag_name || github.ref_name }}.

            Import this manifest URL in Jellyfin to track the newest published build:
            https://github.com/${{ github.repository }}/releases/download/latest/manifest.json
          prerelease: false
          make_latest: true
          fail_on_unmatched_files: true
          files: |
            dist/Jellyfin.Plugin.Totp.zip
            dist/manifest.json
