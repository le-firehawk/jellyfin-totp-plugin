name: Build Jellyfin TOTP Plugin

on:
  push:
    branches: [ '**' ]
    tags: [ 'v*' ]
  pull_request:
  workflow_dispatch:
  release:
    types: [ published ]

permissions:
  contents: write

jobs:
  build:
    if: github.event_name != 'release' || github.event.release.tag_name != 'latest'
    runs-on: ubuntu-latest
    env:
      CONFIGURATION: Release
      ARTIFACT_NAME: Jellyfin.Plugin.Totp
      TARGET_ABI: 10.10.0.0
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore
        run: dotnet restore Jellyfin.Plugin.Totp.csproj

      - name: Build
        run: dotnet build Jellyfin.Plugin.Totp.csproj --configuration "$CONFIGURATION" --no-restore

      - name: Publish
        run: dotnet publish Jellyfin.Plugin.Totp.csproj --configuration "$CONFIGURATION" --no-build --output dist/plugin

      - name: Package plugin
        shell: bash
        run: |
          set -euo pipefail
          cd dist/plugin
          zip -r ../${ARTIFACT_NAME}.zip .
          cd ../..
          echo "Plugin ZIP: dist/${ARTIFACT_NAME}.zip" >> "$GITHUB_STEP_SUMMARY"
          echo "Repository manifest: https://github.com/le-firehawk/jellyfin-totp-plugin/raw/main/manifest.json" >> "$GITHUB_STEP_SUMMARY"

      - name: Update release manifest
        if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'release'
        id: release_manifest
        shell: bash
        env:
          RELEASE_TAG: ${{ github.event.release.tag_name || github.ref_name }}
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
        run: |
          set -euo pipefail

          version="${RELEASE_TAG#v}"
          checksum="$(md5sum "dist/${ARTIFACT_NAME}.zip" | awk '{print $1}')"
          source_url="https://github.com/${GITHUB_REPOSITORY}/releases/download/${RELEASE_TAG}/${ARTIFACT_NAME}.zip"
          changelog="Release ${RELEASE_TAG}."

          git fetch origin "${DEFAULT_BRANCH}"
          git checkout -B "${DEFAULT_BRANCH}" "origin/${DEFAULT_BRANCH}"

          python3 scripts/append_manifest_version.py \
            --version "$version" \
            --target-abi "$TARGET_ABI" \
            --source-url "$source_url" \
            --checksum "$checksum" \
            --changelog "$changelog"

          {
            echo "version=$version"
            echo "checksum=$checksum"
            echo "source_url=$source_url"
          } >> "$GITHUB_OUTPUT"

      - name: Validate static repository manifest
        run: python3 -m json.tool manifest.json > /dev/null

      - name: Upload plugin package
        uses: actions/upload-artifact@v4
        with:
          name: Jellyfin.Plugin.Totp-package
          path: |
            dist/Jellyfin.Plugin.Totp.zip
            manifest.json

      - name: Publish GitHub release
        if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.release.tag_name || github.ref_name }}
          fail_on_unmatched_files: true
          files: |
            dist/Jellyfin.Plugin.Totp.zip
            manifest.json

      - name: Commit release manifest update
        if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'release'
        shell: bash
        env:
          RELEASE_TAG: ${{ github.event.release.tag_name || github.ref_name }}
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
        run: |
          set -euo pipefail

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add manifest.json
          if git diff --cached --quiet; then
            echo "Manifest already contains ${RELEASE_TAG}; no commit needed."
            exit 0
          fi

          git commit -m "Update manifest for ${RELEASE_TAG}"
          git push origin "HEAD:${DEFAULT_BRANCH}"

      - name: Publish pull request GitHub release
        if: github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository
        uses: softprops/action-gh-release@v2
        with:
          tag_name: pr-${{ github.event.pull_request.number }}
          name: Pull Request #${{ github.event.pull_request.number }} Jellyfin TOTP Plugin Build
          body: |
            Automated build for pull request #${{ github.event.pull_request.number }} from commit ${{ github.event.pull_request.head.sha }}.

            Import this manifest URL in Jellyfin to test this pull request build:
            https://github.com/${{ github.repository }}/releases/download/pr-${{ github.event.pull_request.number }}/manifest.json
          prerelease: true
          make_latest: false
          fail_on_unmatched_files: true
          files: |
            dist/Jellyfin.Plugin.Totp.zip
            manifest.json

      - name: Move latest tag
        if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'release'
        shell: bash
        run: |
          set -euo pipefail
          git tag --force latest "${GITHUB_SHA}"
          git push --force origin latest
