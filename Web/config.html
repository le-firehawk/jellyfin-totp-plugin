<div id="TotpConfigPage" data-role="page" class="page type-interior pluginConfigurationPage">
  <div data-role="content"><div class="content-primary">
    <h1>TOTP Two-Factor Authentication</h1>
    <form id="TotpConfigForm">
      <label><input is="emby-checkbox" type="checkbox" id="RequireTwoFactorForAllUsers" /> Mandate TFA for all users</label>
      <div class="inputContainer"><input is="emby-input" id="Issuer" label="Authenticator issuer" /></div>
      <button is="emby-button" type="submit" class="raised button-submit block"><span>Save</span></button>
    </form>
    <p>Install or embed the <code>totpclient</code> page script in Jellyfin Web to add profile setup prompts and admin reset buttons. The server-side middleware still enforces TOTP for authentication requests.</p>
  </div></div>
  <script type="text/javascript">
    var TotpConfig = { pluginUniqueId: '65e3f94b-29d8-4d3b-a348-2343784b1db8' };
    document.querySelector('#TotpConfigPage').addEventListener('pageshow', function () {
      ApiClient.getPluginConfiguration(TotpConfig.pluginUniqueId).then(function (config) { RequireTwoFactorForAllUsers.checked = !!config.RequireTwoFactorForAllUsers; Issuer.value = config.Issuer || 'Jellyfin'; });
    });
    TotpConfigForm.addEventListener('submit', function (e) { e.preventDefault(); ApiClient.getPluginConfiguration(TotpConfig.pluginUniqueId).then(function (config) { config.RequireTwoFactorForAllUsers = RequireTwoFactorForAllUsers.checked; config.Issuer = Issuer.value || 'Jellyfin'; return ApiClient.updatePluginConfiguration(TotpConfig.pluginUniqueId, config); }).then(Dashboard.processPluginConfigurationUpdateResult); });
  </script>
</div>
